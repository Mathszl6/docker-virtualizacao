version: '3.8'

services:
  gateway:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

  app1:
    build: .
    depends_on:
      - db

  app2:
    build: .
    depends_on:
      - db

  db:
    image: redis:alpine